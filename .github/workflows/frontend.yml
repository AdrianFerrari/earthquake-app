name: Frontend — Test & Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'earthquake-dashboard/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'earthquake-dashboard/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  # ── 1. Unit tests (runs on every PR and push to main) ─────────────────────
  unit-test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: earthquake-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: earthquake-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (headless)
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: earthquake-dashboard/coverage

  # ── 2. Cypress E2E tests (runs on every PR and push to main) ──────────────
  e2e-test:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: unit-test
    defaults:
      run:
        working-directory: earthquake-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: earthquake-dashboard/package-lock.json

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: earthquake-dashboard
          start: npm start
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 60
          browser: chrome

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: earthquake-dashboard/cypress/screenshots

  # ── 3. Build (only on push to main) ───────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: earthquake-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: earthquake-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3000' }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: earthquake-dashboard/dist/earthquake-dashboard/browser

  # ── 4. Deploy to Azure Web App ────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'earthquake-app'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }}
          package: .
