name: Frontend — Test & Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'earthquake-dashboard/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'earthquake-dashboard/**'
      - '.github/workflows/frontend.yml'

env:
  ACR_LOGIN_SERVER: earthquake.azurecr.io
  IMAGE_NAME: earthquake-dashboard

jobs:
  # ── 1. Unit tests — Vitest via @angular/build:unit-test (no browser needed) ─
  unit-test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: earthquake-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: earthquake-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (headless)
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: earthquake-dashboard/coverage

  # ── 2. Cypress E2E tests (runs on every PR and push to main) ──────────────
  e2e-test:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: unit-test
    defaults:
      run:
        working-directory: earthquake-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: earthquake-dashboard/package-lock.json

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: earthquake-dashboard
          start: npm start
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 60
          browser: chrome
          headless: true

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: earthquake-dashboard/cypress/screenshots

  # ── 3. Build & push to ACR (only on merge to main) ────────────────────────
  deploy:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./earthquake-dashboard
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || 'http://localhost:3000' }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_DASHBOARD }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DASHBOARD }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
