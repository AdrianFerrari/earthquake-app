name: Backend — Test & Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'earthquake-api/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'earthquake-api/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  # ── 1. Tests (runs on every PR and push to main) ──────────────────────────
  test:
    name: Unit & E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: earthquake-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: earthquake-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test -- --coverage --passWithNoTests

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: earthquake-api/coverage

  # ── 2. Build (only on push to main) ───────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: earthquake-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: earthquake-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: earthquake-api

  # ── 3. Deploy to Azure Web App ────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'earthquake-api'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_API }}
          package: .
