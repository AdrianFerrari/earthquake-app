version: '3.9'

services:
  earthquake-api:
    build:
      context: ./earthquake-api
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - USGS_BASE_URL=https://earthquake.usgs.gov/fdsnws/event/1
      - CACHE_TTL=300
      - CORS_ORIGIN=http://localhost:4200
    restart: unless-stopped

  earthquake-dashboard:
    build:
      context: ./earthquake-dashboard
      dockerfile: Dockerfile
    ports:
      - '4200:80'
    depends_on:
      - earthquake-api
    restart: unless-stopped
